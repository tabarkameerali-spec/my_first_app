workflows:
  ios-build:
    name: Build iOS App
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Install Pods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          # هنا لا نحتاج لتحديد --xcode-project أو --scheme
          # لأن Flutter سيكتشفهم تلقائياً من الهيكلية التي أنشأتها
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa