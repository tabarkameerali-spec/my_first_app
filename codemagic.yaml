workflows:
  default-workflow:
    name: Build Android and iOS
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean and Setup
        script: |
          flutter clean
          flutter pub get
      - name: Generate iOS files
        script: |
          # إجبار Flutter على إعادة إنشاء هيكلية iOS
          flutter create .
      - name: Build iOS
        script: |
          cd ios
          # تثبيت المكتبات (سيقوم تلقائياً بإنشاء ملف Podfile إذا كان مفقوداً)
          pod install
          cd ..
          flutter build ipa --release --no-codesign --scheme="Runner"