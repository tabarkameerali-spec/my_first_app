workflows:
  ios-signing-workflow:
    name: Build Signed iOS App
    environment:
      flutter: stable
      xcode: latest
      groups:
        - apple_credentials
    scripts:
      - name: Initialize Keychain
        script: keychain initialize
      - name: Fetch and Install Signing Files
        script: |
          # هذا السطر سيجلب الشهادات التي أنشأتها عبر الـ API ويضعها في المجلد الصحيح
          app-store-connect fetch-signing-files "com.tabark.myfirstapp" --type IOS_APP_STORE
          keychain add-certificates
      - name: Build IPA
        script: |
          # نستخدم --codesign-identity لضمان أن Flutter يعرف أي شهادة يستخدم
          flutter build ipa --release --export-options-plist=export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa