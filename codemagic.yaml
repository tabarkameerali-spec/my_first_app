scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android
        script: flutter build apk --release
      - name: Build iOS
        script: |
          cd ios
          # هذه الخطوة مهمة جداً لإنشاء ملفات الـ Scheme المفقودة
          pod install
          cd ..
          flutter build ipa --release --no-codesign --export-options-plist=ios/ExportOptions.plist