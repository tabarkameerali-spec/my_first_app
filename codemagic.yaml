workflows:
  ios-build:
    name: Build iOS App
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean and Recreate iOS Structure
        script: |
          flutter clean
          flutter pub get
          # هذا الأمر يضمن إعادة إنشاء ملفات Xcode بشكل سليم
          flutter create .
      - name: Install Pods
        script: |
          cd ios
          pod install
          cd ..
      - name: Build IPA
        script: |
          flutter build ipa --release --no-codesign \
            --xcode-project="ios/Runner.xcodeproj" \
            --scheme="Runner"
    artifacts:
      - build/ios/ipa/*.ipa