workflows:
  ios-signing-workflow:
    name: Build Signed iOS App
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Initialize Keychain
        script: keychain initialize
      - name: Sync Profiles and Certificates
        script: |
          # هذا الأمر يبحث عن الشهادات التي أنشأتها عبر الـ API ويقوم بتركيبها تلقائياً
          xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa