workflows:
  ios-build:
    name: Build iOS App
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Setup iOS Environment
        script: |
          # تنظيف أي بقايا قديمة
          flutter clean
          # إعادة إنشاء هيكلية iOS بما في ذلك ملف Podfile
          flutter create .
      - name: Install Pods
        script: |
          cd ios
          # تحديث المستودعات والتثبيت
          pod repo update
          pod install
      - name: Build IPA
        script: |
          # البناء
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa