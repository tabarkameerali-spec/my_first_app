workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mina_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: "Set up and clean iOS project"
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          test ! -f Podfile && pod init
          cd ..
          flutter clean
          flutter pub get
      - name: "Build iOS app"
        script: |
          flutter build ios --release --no-codesign