workflows:
  ios-build:
    name: Build iOS App
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Setup iOS Environment
        script: |
          flutter clean
          flutter pub get
          flutter create .
      - name: Ensure Podfile exists and Install
        script: |
          cd ios
          # إذا لم يجد ملف Podfile، يقوم بإنشائه يدوياً
          if [ ! -f "Podfile" ]; then
            echo "Podfile not found, initializing..."
            pod init
          fi
          # تثبيت المكتبات
          pod install
      - name: Build IPA
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa