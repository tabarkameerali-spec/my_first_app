workflows:
  ios-signing-workflow:
    name: Build Signed iOS App
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Set up code signing
        script: |
          # هذا الأمر يقوم بجلب الملفات التي أنشأها Codemagic أوتوماتيكياً
          app-store-connect fetch-signing-files "com.tabark.myfirstapp" --type IOS_APP_STORE
          keychain add-certificates
      - name: Build IPA
        script: |
          # البناء مع التوقيع التلقائي
          flutter build ipa --release --export-options-plist=export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa