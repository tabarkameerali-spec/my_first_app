workflows:
  ios-workflow:
    name: Build iOS App
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Setup iOS Workspace
        script: |
          # تنظيف بيئة العمل لضمان عدم وجود ملفات معطوبة
          flutter clean
          flutter pub get
          # إنشاء هيكلية المشروع بالكامل (هذا الأمر يولد مجلد ios بجميع ملفاته)
          flutter create .
      - name: Build IPA
        script: |
          cd ios
          # التأكد من وجود ملف المشروع قبل البناء
          ls -F
          # بناء التطبيق
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa