workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: "Set up and clean iOS project"
        script: |
          echo "Setting up iOS folder"
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          if [ ! -f "Podfile" ]; then
            pod init
          fi
          cd ..
          flutter clean
          flutter pub get
      - name: "Install CocoaPods dependencies"
        script: |
          echo "Installing Pods"
          cd ios
          pod install --repo-update
          cd ..
      - name: "Build iOS app"
        script: |
          echo "Building iOS app"
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa