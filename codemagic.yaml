workflows:
  ios-build:
    name: Build iOS App
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Install Pods
        script: |
          cd ios
          pod repo update
          pod install
          cd ..
      - name: Build IPA
        script: |
          # بناء التطبيق مع تحديد صريح للمشروع والـ Scheme
          flutter build ipa --release --no-codesign \
            --xcode-project="ios/Runner.xcodeproj" \
            --scheme="Runner"
    artifacts:
      - build/ios/ipa/*.ipa